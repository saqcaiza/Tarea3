name: Python Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v4

    - name: Despliegue Simulado
      run: |
        echo "Despliegue exitoso"

    - name: Construir la imagen
      run: docker build -t ghcr.io/saqcaiza/ejercicio:3.0.0 .

    - name: Iniciar sesión en GitHub Container Registry
      run: echo "${{ secrets.TOKEN_TAREA3 }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/saqcaiza/ejercicio:3.0.0

    - name: Mostrar las variables o secrets
      run: |
        echo "probando servidor ssh"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "User: ${{ secrets.VPS_USER }}"
        echo "Port: ${{ secrets.VPS_SSH_PORT }}"
        echo "Password: ${{ secrets.VPS_PASSWORD }}"

    - name: Probar conexion ssh
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        script: |
          echo "conexion ssh exitosa"
          touch ejemplo.txt
   
    - name: Prosar archivos desde el git al servidor
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        source: "stack.yml,Makefile"  
        target: "/home/${{secrets.VPS_USER}}/landingb"
    
    - name: desplegando servicios
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        script: |
            echo: "desplegando servicios"
            cd ~/landingb
            docker pull ghcr.io/saqcaiza/ejercicio:3.0.0
            docker stack deploy -c stack.yml borrar
          