name: Python Application CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest test_python.py

    - name: Run application
      run: |
        python app.py

    - name: Despliegue Simulado
      run: |
        echo "Despliegue exitoso"

    - name: Construir la imagen
      run: docker build -t ghcr.io/saqcaiza/ejercicio:3.0.0 .

    - name: Iniciar sesión en GitHub Container Registry
      run: echo "${{ secrets.TOKEN_TAREA3 }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/saqcaiza/ejercicio:3.0.0